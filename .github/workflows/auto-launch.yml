name: OCI ARM Auto Launch

# Launches the configured OCI ARM instance(s), retrying according to the
# config's own request_interval / max_attempts within each run.
#
# Triggers:
#   - schedule:           restarts the run roughly every 6 hours, so retries
#                         continue across GitHub's 6-hour per-job limit
#   - workflow_dispatch:  manual run from the Actions tab
#
# Retry behavior is driven entirely by config.json:
#   - request_interval    seconds to sleep between cycles (your setting)
#   - max_attempts        0 = retry until success; N = stop after N cycles
# The job timeout below keeps a single run safely under GitHub's 6h cap;
# the schedule then starts a fresh run.
#
# All credentials are injected at runtime from GitHub Secrets and are never
# committed to the repository:
#   - CONFIG_JSON           full config.json content (accounts, OCI keys, ...)
#   - DISCORD_WEBHOOK_URL    (optional) Discord webhook for notifications
#   - DISCORD_USER_ID        (optional) Discord user ID to mention

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Least privilege: read repo contents, and write to Actions so this run can
# cancel previously running runs of this workflow before it launches.
permissions:
  contents: read
  actions: write

# No blocking concurrency group on purpose: a new run must be allowed to
# start immediately so its "Cancel previously running workflow runs" step
# can terminate any older run that is still going. The newest run wins.

jobs:
  launch:
    runs-on: ubuntu-latest
    # GitHub kills any job at 6h (360 min). Stay just under that so the
    # run ends cleanly and the next scheduled run can take over.
    timeout-minutes: 359

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Quiet install; suppress all output (public Action logs).
        run: |
          python -m pip install --quiet --upgrade pip >/dev/null 2>&1
          python -m pip install --quiet -r requirements.txt >/dev/null 2>&1

      - name: Write config.json from secret
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          if [ -z "${CONFIG_JSON}" ]; then
            echo "::error::CONFIG_JSON secret is not set."
            exit 1
          fi
          # %s does not interpret backslash escapes, so JSON stays intact.
          printf '%s' "${CONFIG_JSON}" > config.json

      - name: Cancel previously running workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        # Before launching, check for other runs of THIS workflow that are
        # still active. Older runs have a smaller run id than the current run.
        #   - none active  -> no-op, continue
        #   - some active  -> cancel them all, wait until they stop, continue
        # Output is suppressed (only run metadata anyway).
        run: |
          query="repos/${REPO}/actions/workflows/auto-launch.yml/runs?per_page=100"
          jq_filter=".workflow_runs[] | select(.status != \"completed\") | select(.id < ${CURRENT_RUN_ID}) | .id"
          older=$(gh api "${query}" --jq "${jq_filter}" 2>/dev/null || true)
          for id in ${older}; do
            gh api -X POST "repos/${REPO}/actions/runs/${id}/cancel" >/dev/null 2>&1 || true
          done
          # Best-effort wait (up to ~60s) until older runs have actually stopped.
          for _ in $(seq 1 12); do
            remaining=$(gh api "${query}" --jq "${jq_filter}" 2>/dev/null | grep -c . || true)
            [ "${remaining:-0}" -eq 0 ] && break
            sleep 5
          done

      - name: Run launcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        # No --once: retries follow config.json (request_interval / max_attempts).
        # Suppress all stdout/stderr so nothing (account IDs, OCIDs, instance
        # IDs, errors) is ever printed to the public Action log. Status is
        # delivered via Discord instead. The 2>/dev/null also hides crashes;
        # the step's exit code still reflects success/failure.
        run: python create_instance.py >/dev/null 2>&1

      - name: Remove config.json
        if: always()
        run: rm -f config.json
