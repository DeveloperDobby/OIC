name: OCI ARM Auto Launch

# Launches the configured OCI ARM instance(s), retrying according to the
# config's own request_interval / max_attempts within each run.
#
# Triggers:
#   - schedule:           restarts the run roughly every 6 hours, so retries
#                         continue across GitHub's 6-hour per-job limit
#   - workflow_dispatch:  manual run from the Actions tab
#
# Retry behavior is driven entirely by config.json:
#   - request_interval    seconds to sleep between cycles (your setting)
#   - max_attempts        0 = retry until success; N = stop after N cycles
# The job timeout below keeps a single run safely under GitHub's 6h cap;
# the schedule then starts a fresh run.
#
# All credentials are injected at runtime from GitHub Secrets and are never
# committed to the repository:
#   - CONFIG_JSON           full config.json content (accounts, OCI keys, ...)
#   - DISCORD_WEBHOOK_URL    (optional) Discord webhook for notifications
#   - DISCORD_USER_ID        (optional) Discord user ID to mention

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Least-privilege: this workflow only needs to read the repo contents.
permissions:
  contents: read

# Never run two launch attempts at the same time.
concurrency:
  group: oci-arm-auto-launch
  cancel-in-progress: false

jobs:
  launch:
    runs-on: ubuntu-latest
    # GitHub kills any job at 6h (360 min). Stay safely under that so the
    # run ends cleanly and the next scheduled run can take over.
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Write config.json from secret
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          if [ -z "${CONFIG_JSON}" ]; then
            echo "::error::CONFIG_JSON secret is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          # %s does not interpret backslash escapes, so JSON stays intact.
          printf '%s' "${CONFIG_JSON}" > config.json

      - name: Run launcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        # No --once: retries follow config.json (request_interval / max_attempts).
        run: python create_instance.py

      - name: Remove config.json
        if: always()
        run: rm -f config.json
